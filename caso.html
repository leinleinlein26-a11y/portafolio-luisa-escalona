<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

body {
  background: #000;
  margin: 0;
}

/* ================= TIPOGRAFÍA ================= */
.scroll-solid {
  white-space: nowrap;
  font-family: 'Anton', sans-serif;
  font-size: 7rem;
  letter-spacing: 6px;
  color: white;
  animation: scrollLeft 30s linear infinite;
}

.scroll-outline {
  white-space: nowrap;
  font-family: 'Anton', sans-serif;
  font-size: 7rem;
  letter-spacing: 6px;
  -webkit-text-stroke: 1px rgba(255,255,255,0.3);
  color: transparent;
  animation: scrollRight 40s linear infinite;
}

/* ================= ANIMACIONES ================= */
@keyframes scrollLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

@keyframes scrollRight {
  0% { transform: translateX(-50%); }
  100% { transform: translateX(0); }
}

/* ================= FADE ================= */
.fade {
  opacity: 0;
  transform: translateY(60px);
  transition: all 1.2s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* ================= MENÚ ================= */
nav {
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 10px;
}
</style>
</head>

<body>

<main class="max-w-md mx-auto px-6">

  <!-- MENÚ -->
  <nav class="flex justify-center mb-10">
  <ul class="flex gap-10 text-white text-xs tracking-[3px] uppercase">

    <li>
      <a href="index.html" class="hover:opacity-50 transition">
        Inicio

    </li>

    <li>

        Portafolio

    </li>

    <li>
      <a href="caso.html" class="hover:opacity-50 transition">

</nav>

<script>
const items = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.2 });

items.forEach(el => observer.observe(el));
</script>
